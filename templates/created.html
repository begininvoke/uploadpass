<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Created — UploadPass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #161616;
            border: 1px solid #252525;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 520px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .check {
            width: 64px;
            height: 64px;
            background: rgba(34, 197, 94, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
        }
        h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        p { color: #888; font-size: 14px; margin-bottom: 24px; }
        .link-box {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 16px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 14px;
            color: #6366f1;
            word-break: break-all;
            margin-bottom: 24px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .link-box:hover { border-color: #6366f1; }
        .actions { display: flex; gap: 12px; justify-content: center; }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn-secondary {
            background: #1a1a1a;
            border: 1px solid #333;
            color: #ccc;
        }
        .toast {
            margin-top: 16px;
            font-size: 13px;
            color: #22c55e;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">&#10003;</div>
        <h2>Link Created</h2>
        <p>Share this link. The recipient will need the password to view the text.</p>
        <div class="link-box" onclick="copyLink()">{{.Link}}</div>
        <div class="actions">
            <button class="btn btn-primary" onclick="copyLink()">Copy Link</button>
            <a class="btn btn-secondary" href="/admin/dashboard">Back to Dashboard</a>
        </div>
        <div class="toast" id="toast">Copied to clipboard!</div>
    </div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText('{{.Link}}');
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
