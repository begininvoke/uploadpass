<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Created — UploadPass</title>
    <style>
        :root {
            --bg: #050505;
            --card: #111113;
            --card-border: #1e1e22;
            --input-bg: #0a0a0c;
            --input-border: #252529;
            --text: #e4e4e7;
            --text-dim: #71717a;
            --accent: #818cf8;
            --accent2: #a78bfa;
            --green: #4ade80;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 50% 30%, rgba(74,222,128,0.05) 0%, transparent 50%);
            pointer-events: none;
        }
        .card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon {
            width: 60px;
            height: 60px;
            background: rgba(74,222,128,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
        }
        .icon svg { width: 28px; height: 28px; color: var(--green); }
        h2 { font-size: 21px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.3px; }
        .desc { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
        .link-box {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            padding: 15px 18px;
            font-family: 'SF Mono', 'Fira Code', Monaco, monospace;
            font-size: 13px;
            color: var(--accent);
            word-break: break-all;
            margin-bottom: 24px;
            cursor: pointer;
            transition: border-color 0.2s;
            line-height: 1.5;
            text-align: left;
        }
        .link-box:hover { border-color: var(--accent); }
        .actions { display: flex; gap: 10px; justify-content: center; }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn-primary:hover { box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
        .btn-secondary {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--input-border);
            color: var(--text-dim);
        }
        .btn-secondary:hover { color: var(--text); background: rgba(255,255,255,0.07); }
        .btn svg { width: 16px; height: 16px; }
        .toast {
            margin-top: 18px;
            font-size: 13px;
            color: var(--green);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }
        .toast svg { width: 15px; height: 15px; }
        .toast.show { opacity: 1; }

        @media (max-width: 500px) {
            .card { padding: 32px 24px; border-radius: 16px; }
            .actions { flex-direction: column; }
            .btn { justify-content: center; }
            .link-box { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2>Link Created</h2>
        <p class="desc">Share this link. The recipient will need the password to view the content.</p>
        <div class="link-box" onclick="copyLink()">{{.Link}}</div>
        <div class="actions">
            <button class="btn btn-primary" onclick="copyLink()">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                Copy Link</button>
            <a class="btn btn-secondary" href="/admin/dashboard">Back to Dashboard</a>
        </div>
        <div class="toast" id="toast">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
            Copied to clipboard!
        </div>
    </div>

    <script>
        function copyLink() {
            navigator.clipboard.writeText('{{.Link}}');
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }
    </script>
</body>
</html>
