<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found — UploadPass</title>
    <style>
        :root {
            --bg: #050505;
            --card: #111113;
            --card-border: #1e1e22;
            --text: #e4e4e7;
            --text-dim: #71717a;
            --text-faint: #3f3f46;
            --danger: #f87171;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon {
            width: 64px;
            height: 64px;
            background: rgba(248,113,113,0.08);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 22px;
        }
        .icon svg { width: 30px; height: 30px; color: var(--danger); }
        h2 { font-size: 21px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.3px; }
        p { color: var(--text-dim); font-size: 14px; line-height: 1.6; }

        @media (max-width: 480px) {
            .card { padding: 36px 24px; border-radius: 16px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
        </div>
        <h2>Link Not Found</h2>
        <p>This link doesn't exist or has been deleted.</p>
    </div>
</body>
</html>
