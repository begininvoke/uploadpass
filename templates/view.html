<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View — UploadPass</title>
    <style>
        :root {
            --bg: #050505;
            --card: #111113;
            --card-border: #1e1e22;
            --input-bg: #0a0a0c;
            --input-border: #252529;
            --text: #e4e4e7;
            --text-dim: #71717a;
            --accent: #818cf8;
            --accent2: #a78bfa;
            --green: #4ade80;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 50% 30%, rgba(74,222,128,0.04) 0%, transparent 50%);
            pointer-events: none;
        }
        .card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 580px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #1a1a1e;
        }
        .icon {
            width: 44px;
            height: 44px;
            background: rgba(74,222,128,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .icon svg { width: 22px; height: 22px; color: var(--green); }
        .header-text h2 { font-size: 17px; font-weight: 700; letter-spacing: -0.2px; }
        .header-text p { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
        .content-box {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            padding: 22px;
            font-size: 14px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 50vh;
            overflow-y: auto;
            color: var(--text);
        }
        .content-box::-webkit-scrollbar { width: 6px; }
        .content-box::-webkit-scrollbar-track { background: transparent; }
        .content-box::-webkit-scrollbar-thumb { background: #252529; border-radius: 3px; }
        .actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 11px 22px;
            border: none;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 7px;
        }
        .btn:active { transform: scale(0.98); }
        .btn svg { width: 15px; height: 15px; }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn-primary:hover { box-shadow: 0 4px 20px rgba(99,102,241,0.25); }
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card);
            border: 1px solid var(--card-border);
            color: var(--green);
            padding: 12px 22px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
            pointer-events: none;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .toast svg { width: 16px; height: 16px; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @media (max-width: 500px) {
            .card { padding: 28px 20px; border-radius: 16px; }
            .content-box { padding: 16px; font-size: 13px; }
            .header { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="icon">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 11V7a4 4 0 118 0m-4 8v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z"/></svg>
            </div>
            <div class="header-text">
                <h2>Content Unlocked</h2>
                <p>The protected text is shown below</p>
            </div>
        </div>
        <div class="content-box" id="content">{{.Content}}</div>
        <div class="actions">
            <button class="btn btn-primary" onclick="copyContent()">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg>
                Copy Text
            </button>
        </div>
    </div>

    <div class="toast" id="toast">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        Copied!
    </div>

    <script>
        function copyContent() {
            navigator.clipboard.writeText(document.getElementById('content').textContent);
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2200);
        }
    </script>
</body>
</html>
