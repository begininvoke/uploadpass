<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View — UploadPass</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #161616;
            border: 1px solid #252525;
            border-radius: 16px;
            padding: 48px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .icon {
            width: 64px;
            height: 64px;
            background: rgba(34, 197, 94, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
        }
        h2 {
            text-align: center;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
        }
        .content-box {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px;
            font-size: 15px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 400px;
            overflow-y: auto;
        }
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn-copy {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .toast {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #22c55e;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#128275;</div>
        <h2>Unlocked</h2>
        <div class="content-box" id="content">{{.Content}}</div>
        <div class="actions">
            <button class="btn btn-copy" onclick="copyContent()">Copy Text</button>
        </div>
        <div class="toast" id="toast">Copied!</div>
    </div>

    <script>
        function copyContent() {
            const text = document.getElementById('content').textContent;
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
