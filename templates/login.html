<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — UploadPass</title>
    <style>
        :root {
            --bg: #050505;
            --card: #111113;
            --card-border: #1e1e22;
            --input-bg: #0a0a0c;
            --input-border: #252529;
            --text: #e4e4e7;
            --text-dim: #71717a;
            --accent: #818cf8;
            --accent2: #a78bfa;
            --danger: #f87171;
            --radius: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
            animation: drift 20s ease-in-out infinite alternate;
            pointer-events: none;
        }
        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-5%, 3%); }
        }
        .card {
            position: relative;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.6);
            animation: fadeUp 0.5s ease;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo { text-align: center; margin-bottom: 36px; }
        .logo-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, rgba(99,102,241,0.15), rgba(139,92,246,0.15));
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logo-icon svg { width: 28px; height: 28px; color: var(--accent); }
        .logo h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.3px;
        }
        .logo p { color: var(--text-dim); font-size: 14px; margin-top: 6px; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #3f3f46;
            pointer-events: none;
        }
        input[type="password"] {
            width: 100%;
            padding: 13px 16px 13px 42px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="password"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(129,140,248,0.1);
        }
        button {
            width: 100%;
            padding: 13px;
            margin-top: 8px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: var(--radius);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
            letter-spacing: 0.2px;
        }
        button:hover {
            opacity: 0.92;
            box-shadow: 0 4px 20px rgba(99,102,241,0.3);
        }
        button:active { transform: scale(0.98); }
        .error {
            background: rgba(248,113,113,0.08);
            border: 1px solid rgba(248,113,113,0.2);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            margin-bottom: 20px;
            text-align: center;
        }
        @media (max-width: 480px) {
            .card { padding: 32px 24px; border-radius: 16px; }
            .logo-icon { width: 48px; height: 48px; border-radius: 14px; }
            .logo-icon svg { width: 24px; height: 24px; }
            .logo h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </div>
            <h1>UploadPass</h1>
            <p>Admin Panel</p>
        </div>
        {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
        <form method="POST" action="/admin">
            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-wrap">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
                    <input type="password" id="password" name="password" placeholder="Enter admin password" autofocus required>
                </div>
            </div>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
